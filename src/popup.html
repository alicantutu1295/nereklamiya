<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NeReklamiYa</title>
    <link rel="stylesheet" href="popup.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  </head>
  <body>
    <main class="app">
      <div class="dot-pattern"></div>
      <div class="noise-overlay"></div>
      
      <header class="header">
        <div class="logo">
          <img src="/SiMGEM.png" class="logo-image" alt="Logo">
          <span class="logo-text">NeReklamiYa</span>
        </div>
        <label class="switch" aria-label="Koruma durumunu değiştir">
          <input id="enabled" type="checkbox">
          <span class="switch-track">
            <span class="switch-thumb"></span>
          </span>
        </label>
      </header>

      <section class="status-card">
        <div class="status-icon" id="statusDot">
          <span class="material-symbols-outlined">check_circle</span>
        </div>
        <div class="status-text">
          <h2 id="headline">Koruma aktif</h2>
          <p id="status">Hazır</p>
        </div>
      </section>

      <section class="stats-grid">
        <div class="stat-card">
          <span class="material-symbols-outlined stat-icon">block</span>
          <div class="stat-content">
            <strong id="blockedToday">0</strong>
            <span>Bugün</span>
          </div>
        </div>
        <div class="stat-card">
          <span class="material-symbols-outlined stat-icon">shield</span>
          <div class="stat-content">
            <strong id="totalBlocked">0</strong>
            <span>Toplam</span>
          </div>
        </div>
      </section>

      <section class="options-list">
        <label class="option-card">
          <div class="option-content">
            <span class="material-symbols-outlined option-icon">play_circle</span>
            <div class="option-text">
              <strong>YouTube modu</strong>
              <small>Reklam alanlarını hedefler</small>
            </div>
          </div>
          <div class="switch">
            <input id="youtubeMode" type="checkbox">
            <span class="switch-track">
              <span class="switch-thumb"></span>
            </span>
          </div>
        </label>

        <div class="option-card" style="opacity: 0.5; cursor: not-allowed;">
          <div class="option-content">
            <span class="material-symbols-outlined option-icon">pause_circle</span>
            <div class="option-text">
              <strong>Bu sitede durdur</strong>
              <small id="activeSite">Aktif site okunuyor...</small>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
